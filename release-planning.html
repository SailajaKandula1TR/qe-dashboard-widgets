<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Planning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <script crossorigin src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f1f5f9; color: #1e293b; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .drag-over { border: 2px dashed #3b82f6 !important; background: #eff6ff !important; }
        .dragging { opacity: 0.5; }
        .progress-bar { height: 18px; background: #e2e8f0; border-radius: 9px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 9px; transition: width 0.4s ease; }
        .tab-active { background: #1d4ed8; color: white; }
        .tab-inactive { background: #e2e8f0; color: #475569; }
        .tab-inactive:hover { background: #cbd5e1; }
        input[type=number]::-webkit-inner-spin-button { opacity: 0.5; }
        .inline-input { background: transparent; border: none; outline: none; width: 100%; }
        .inline-input:hover { background: #f0f9ff; border-radius: 3px; }
        .inline-input:focus { background: white; border: 1px solid #93c5fd; border-radius: 3px; padding: 0 4px; }
        .work-item-card { cursor: grab; user-select: none; }
        .work-item-card:active { cursor: grabbing; }
        .overdue { color: #dc2626; font-weight: 600; }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ─── Utility helpers ────────────────────────────────────────────────
        const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
        const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

        function calculateWorkingDays(startDate, endDate) {
            if (!startDate || !endDate) return 0;
            const s = new Date(startDate), e = new Date(endDate);
            if (s >= e) return 0;
            let days = 0, cur = new Date(s);
            while (cur <= e) {
                const d = cur.getDay();
                if (d !== 0 && d !== 6) days++;
                cur.setDate(cur.getDate() + 1);
            }
            return days;
        }

        function addWorkingHours(startDate, hours, hoursPerDay) {
            if (!startDate || !hours) return '';
            const hpp = hoursPerDay || 7;
            const daysNeeded = Math.ceil(hours / hpp);
            let cur = new Date(startDate);
            let added = 0;
            while (added < daysNeeded) {
                cur.setDate(cur.getDate() + 1);
                const d = cur.getDay();
                if (d !== 0 && d !== 6) added++;
            }
            return cur.toISOString().split('T')[0];
        }

        // ─── Defaults ───────────────────────────────────────────────────────
        const today = new Date().toISOString().split('T')[0];
        const in30 = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];

        const makeTeam = (name) => ({
            teamName: name,
            releaseName: 'Release 1.0',
            startDate: today,
            endDate: in30,
            workingHoursPerDay: 7,
            holidays: 0,
            teamMembers: [],
            workItems: [],
            sizeMappings: [
                { size: 'XS',  sprints: 1, devHours: 49,  qaHours: 21  },
                { size: 'S',   sprints: 2, devHours: 98,  qaHours: 42  },
                { size: 'M',   sprints: 3, devHours: 147, qaHours: 63  },
                { size: 'L',   sprints: 4, devHours: 196, qaHours: 84  },
                { size: 'XL',  sprints: 6, devHours: 294, qaHours: 126 },
                { size: 'XXL', sprints: 8, devHours: 392, qaHours: 168 },
            ]
        });

        const DEFAULT_TEAMS = {
            Team1: makeTeam('Team1'),
            Team2: makeTeam('Team2'),
            Team3: makeTeam('Team3'),
            Team4: makeTeam('Team4'),
        };

        // ─── ProgressBar component ───────────────────────────────────────────
        function ProgressBar({ value, max, colorClass = 'bg-green-500', label }) {
            const pct = max > 0 ? clamp(Math.round((value / max) * 100), 0, 200) : 0;
            const displayPct = clamp(pct, 0, 100);
            const over = pct > 100;
            return (
                <div>
                    <div className="progress-bar">
                        <div
                            className={`progress-fill ${over ? 'bg-red-500' : colorClass}`}
                            style={{ width: `${displayPct}%` }}
                        />
                    </div>
                    {label && <div className={`text-xs mt-0.5 ${over ? 'text-red-600 font-semibold' : 'text-slate-500'}`}>{label}</div>}
                </div>
            );
        }

        // ─── Migration: ensure all teams have full 6-size sizeMappings with sprints ───
        const CANONICAL_SIZES = [
            { size: 'XS',  sprints: 1, devHours: 49,  qaHours: 21  },
            { size: 'S',   sprints: 2, devHours: 98,  qaHours: 42  },
            { size: 'M',   sprints: 3, devHours: 147, qaHours: 63  },
            { size: 'L',   sprints: 4, devHours: 196, qaHours: 84  },
            { size: 'XL',  sprints: 6, devHours: 294, qaHours: 126 },
            { size: 'XXL', sprints: 8, devHours: 392, qaHours: 168 },
        ];
        function migrateTeams(teams) {
            const result = {};
            for (const [key, t] of Object.entries(teams)) {
                const existingMap = {};
                (t.sizeMappings || []).forEach(sm => { existingMap[sm.size] = sm; });
                const merged = CANONICAL_SIZES.map(canon => {
                    const existing = existingMap[canon.size] || {};
                    return {
                        size:     canon.size,
                        sprints:  existing.sprints  ?? canon.sprints,
                        devHours: existing.devHours ?? canon.devHours,
                        qaHours:  existing.qaHours  ?? canon.qaHours,
                    };
                });
                result[key] = { ...t, sizeMappings: merged };
            }
            return result;
        }

        // ─── Main App ────────────────────────────────────────────────────────
        function ReleasePlanningApp() {
            const [teams, setTeams] = useState(() => {
                try {
                    const saved = JSON.parse(localStorage.getItem('rp_teams') || 'null');
                    return saved ? migrateTeams(saved) : DEFAULT_TEAMS;
                }
                catch { return DEFAULT_TEAMS; }
            });
            const [activeTab, setActiveTab] = useState(() =>
                localStorage.getItem('rp_activeTab') || 'Team1'
            );

            // Supabase state
            const [sbUrl, setSbUrl]         = useState(() => localStorage.getItem('rp_sbUrl') || '');
            const [sbKey, setSbKey]         = useState(() => localStorage.getItem('rp_sbKey') || '');
            const [sbConnected, setSbConnected] = useState(false);
            const [showConfig, setShowConfig]   = useState(false);
            const [configTab, setConfigTab]     = useState('supabase'); // 'supabase' | 'mongodb'
            const [syncStatus, setSyncStatus]   = useState('idle'); // idle | saving | saved | error
            const [lastSaved, setLastSaved]       = useState(null);
            const supabaseRef = useRef(null);
            // MongoDB Atlas App Services state
            const [mgUrl, setMgUrl]         = useState(() => localStorage.getItem('rp_mgUrl') || '');
            const [mgKey, setMgKey]         = useState(() => localStorage.getItem('rp_mgKey') || '');
            const [mgConnected, setMgConnected] = useState(false);
            const [mgSyncStatus, setMgSyncStatus] = useState('idle');
            const [mgLastSaved, setMgLastSaved]   = useState(null);
            const mgAutoSaveTimer = useRef(null);
            const autoSaveTimer = useRef(null);
            const isFirstLoad = useRef(true);
            const dragRowId = useRef(null);
            const dragOverRowId = useRef(null);

            // Drag state
            const [dragItem, setDragItem]   = useState(null);   // { teamKey, itemId }
            const [dragOver, setDragOver]   = useState(null);   // 'planning' | 'backlog'

            // Persist to localStorage on every change
            useEffect(() => {
                localStorage.setItem('rp_teams', JSON.stringify(teams));
                localStorage.setItem('rp_activeTab', activeTab);
            }, [teams, activeTab]);

            // Auto-reconnect on page load if credentials exist
            useEffect(() => {
                const savedUrl = localStorage.getItem('rp_sbUrl');
                const savedKey = localStorage.getItem('rp_sbKey');
                if (savedUrl && savedKey) {
                    const client = supabase.createClient(savedUrl, savedKey);
                    supabaseRef.current = client;
                    // Silently verify connection and load latest data
                    client
                        .from('release_planning_snapshots')
                        .select('data')
                        .eq('key', 'all_teams')
                        .single()
                        .then(({ data, error }) => {
                            if (!error && data) {
                                try {
                                    const loaded = JSON.parse(data.data);
                                    setTeams(migrateTeams(loaded));
                                } catch (_) {}
                            }
                            setSbConnected(true);
                            setSyncStatus('saved');
                            setLastSaved(new Date());
                            isFirstLoad.current = false;
                        })
                        .catch(() => { isFirstLoad.current = false; });
                } else {
                    isFirstLoad.current = false;
                }
            }, []);

            // Debounced auto-save to Supabase on every teams change
            useEffect(() => {
                if (isFirstLoad.current) return;
                if (!sbConnected || !supabaseRef.current) return;
                setSyncStatus('saving');
                clearTimeout(autoSaveTimer.current);
                autoSaveTimer.current = setTimeout(async () => {
                    try {
                        const { error } = await supabaseRef.current
                            .from('release_planning_snapshots')
                            .upsert(
                                { key: 'all_teams', data: JSON.stringify(teams), updated_at: new Date().toISOString() },
                                { onConflict: 'key' }
                            );
                        if (!error) setLastSaved(new Date());
                        setSyncStatus(error ? 'error' : 'saved');
                    } catch (_) {
                        setSyncStatus('error');
                    }
                }, 1200);
            }, [teams, sbConnected]);

            // MongoDB auto-reconnect on page load
            useEffect(() => {
                const savedUrl = localStorage.getItem('rp_mgUrl');
                const savedKey = localStorage.getItem('rp_mgKey');
                if (savedUrl && savedKey) {
                    fetch(`${savedUrl}?key=all_teams`, { headers: { 'api-key': savedKey } })
                        .then(r => r.ok ? r.json() : null)
                        .then(d => {
                            if (d && d.data) {
                                try { setTeams(migrateTeams(JSON.parse(d.data))); } catch(_) {}
                            }
                            setMgConnected(true);
                            setMgSyncStatus('saved');
                            setMgLastSaved(new Date());
                        })
                        .catch(() => {});
                }
            }, []);

            // MongoDB debounced auto-save
            useEffect(() => {
                if (isFirstLoad.current) return;
                if (!mgConnected || !mgUrl || !mgKey) return;
                setMgSyncStatus('saving');
                clearTimeout(mgAutoSaveTimer.current);
                mgAutoSaveTimer.current = setTimeout(async () => {
                    try {
                        const r = await fetch(mgUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'api-key': mgKey },
                            body: JSON.stringify({ key: 'all_teams', data: JSON.stringify(teams) })
                        });
                        if (r.ok) { setMgLastSaved(new Date()); setMgSyncStatus('saved'); }
                        else setMgSyncStatus('error');
                    } catch(_) { setMgSyncStatus('error'); }
                }, 1200);
            }, [teams, mgConnected]);

            // Current team helpers
            const team    = teams[activeTab] || Object.values(teams)[0];
            const tabKey  = activeTab;

            const setTeamField = (field, value) =>
                setTeams(prev => ({ ...prev, [tabKey]: { ...prev[tabKey], [field]: value } }));

            const setTeamMembers  = (v) => setTeamField('teamMembers', v);
            const setWorkItems    = (v) => setTeamField('workItems', v);
            const setSizeMappings = (v) => setTeamField('sizeMappings', v);

            // ── computed ──────────────────────────────────────────────────────
            const backlogItems  = team.workItems.filter(i => !i.isPlanned).sort((a,b) => a.ranking - b.ranking);
            const plannedItems  = team.workItems.filter(i => i.isPlanned).sort((a,b) => a.ranking - b.ranking);

            const workingDays      = calculateWorkingDays(team.startDate, team.endDate);
            const holidays         = parseInt(team.holidays) || 0;
            const actualWorkingDays = Math.max(0, workingDays - holidays);

            // Capacity & allocation are in DAYS (member.capacity stored as days)
            const totalCapacity = team.teamMembers.reduce((s, m) => s + (parseFloat(m.capacity)||0), 0);

            const getMemberAlloc = (memberId) => {
                const hpp = team.workingHoursPerDay || 7;
                const devH = team.workItems.filter(i => i.assignedDev === memberId)
                    .reduce((s, i) => s + (parseInt(i.devHours)||0), 0);
                const qaH  = team.workItems.filter(i => i.assignedQA  === memberId)
                    .reduce((s, i) => s + (parseInt(i.qaHours)||0), 0);
                // return days
                return {
                    devD: +(devH / hpp).toFixed(1),
                    qaD:  +(qaH  / hpp).toFixed(1),
                    totalD: +((devH + qaH) / hpp).toFixed(1)
                };
            };

            const totalAllocatedHours = team.workItems.reduce((s, i) =>
                s + (parseInt(i.devHours)||0) + (parseInt(i.qaHours)||0), 0);
            const totalAllocated = +((totalAllocatedHours / (team.workingHoursPerDay || 7)).toFixed(1));

            // Work type breakdown uses ALL work items (not just planned)
            // Work type totals in days
            const hpp = team.workingHoursPerDay || 7;
            const workTypeTotals = ['feature','techdebt','adhoc','bug'].reduce((acc, wt) => {
                const hrs = team.workItems.filter(i => i.workType === wt)
                    .reduce((s, i) => s + (parseInt(i.devHours)||0) + (parseInt(i.qaHours)||0), 0);
                acc[wt] = +(hrs / hpp).toFixed(1);  // store as days
                return acc;
            }, {});
            const totalWTDays = Object.values(workTypeTotals).reduce((s, v) => s + v, 0);
            const wtPct = (wt) => totalCapacity > 0 ? Math.round((workTypeTotals[wt] / totalCapacity) * 100) : 0;

            const featureHoursPct  = wtPct('feature');
            const overallUtil      = totalCapacity > 0 ? clamp(Math.round((totalAllocated / totalCapacity) * 100), 0, 999) : 0;

            // ── Tab management ────────────────────────────────────────────────
            const addTab = () => {
                const n = Object.keys(teams).length + 1;
                const key = `Team${n}`;
                setTeams(prev => ({ ...prev, [key]: makeTeam(key) }));
                setActiveTab(key);
            };

            const removeTab = (key) => {
                if (Object.keys(teams).length <= 1) return alert('Cannot remove the last team.');
                if (!confirm(`Remove ${teams[key].teamName}? All data will be lost.`)) return;
                const next = { ...teams };
                delete next[key];
                setTeams(next);
                if (activeTab === key) setActiveTab(Object.keys(next)[0]);
            };

            // ── Team Members ──────────────────────────────────────────────────
            const addMember = () => setTeamMembers([...team.teamMembers, {
                id: uid(), name: 'New Member', capacity: 20
            }]);

            const updateMember = (id, field, value) =>
                setTeamMembers(team.teamMembers.map(m => m.id === id ? { ...m, [field]: value } : m));

            const deleteMember = (id) =>
                setTeamMembers(team.teamMembers.filter(m => m.id !== id));

            // ── Work Items ────────────────────────────────────────────────────
            const addWorkItem = (planned = false) => {
                const base = {
                    id: uid(),
                    featureId: `F-${team.workItems.length + 1}`,
                    title: 'New Work Item',
                    ranking: team.workItems.length + 1,
                    workType: 'feature',
                    size: 'M',
                    devStartDate: team.startDate,
                    qaStartDate: team.startDate,
                    devHours: 0, qaHours: 0,
                    assignedDev: '', assignedQA: '',
                    prdComplete: false, designComplete: false,
                    isPlanned: planned,
                    testPlanDate: '',
                    testPlan: 'Not Started',
                    testMapping: 'Not Started',
                    testLegacy: 'Not Started',
                    testModern: 'Not Started',
                    testOutcome: 'Not Started',
                    bugs: 'Not Started'
                };
                setWorkItems([...team.workItems, base]);
            };

            const updateWorkItem = (id, field, value) =>
                setWorkItems(team.workItems.map(i => i.id === id ? { ...i, [field]: value } : i));

            const deleteWorkItem = (id) =>
                setWorkItems(team.workItems.filter(i => i.id !== id));

            const reorderWorkItems = () => {
                const current = [...team.workItems];
                const fromIdx = current.findIndex(i => i.id === dragRowId.current);
                const toIdx   = current.findIndex(i => i.id === dragOverRowId.current);
                if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
                const reordered = [...current];
                const [moved] = reordered.splice(fromIdx, 1);
                reordered.splice(toIdx, 0, moved);
                setWorkItems(reordered);
                dragRowId.current = null;
                dragOverRowId.current = null;
            };

            const moveToPlanning = (id) => updateWorkItem(id, 'isPlanned', true);
            const moveToBacklog  = (id) => updateWorkItem(id, 'isPlanned', false);

            // Apply size preset
            const applySizePreset = (id, size) => {
                const mapping = team.sizeMappings.find(m => m.size === size);
                if (!mapping) return;
                setWorkItems(team.workItems.map(i =>
                    i.id === id ? { ...i, size, devHours: mapping.devHours, qaHours: mapping.qaHours } : i
                ));
            };

            // Days ↔ Hours helpers (for display)
            const hoursPerDay = team.workingHoursPerDay || 7;
            const hoursToDays = (h) => h > 0 ? +(h / hoursPerDay).toFixed(1) : 0;
            const daysToHours = (d) => Math.round((parseFloat(d) || 0) * hoursPerDay);

            // ── Drag & Drop ───────────────────────────────────────────────────
            const onDragStart = (e, item) => {
                e.dataTransfer.effectAllowed = 'move';
                setDragItem({ teamKey: tabKey, itemId: item.id });
                e.currentTarget.classList.add('dragging');
            };

            const onDragEnd = (e) => {
                e.currentTarget.classList.remove('dragging');
            };

            const onDropToPlanning = (e) => {
                e.preventDefault();
                setDragOver(null);
                if (dragItem) moveToPlanning(dragItem.itemId);
                setDragItem(null);
            };

            const onDropToBacklog = (e) => {
                e.preventDefault();
                setDragOver(null);
                if (dragItem) moveToBacklog(dragItem.itemId);
                setDragItem(null);
            };

            // ── Supabase ──────────────────────────────────────────────────────
            const connectSupabase = async () => {
                if (!sbUrl || !sbKey) return alert('Please enter your Supabase URL and anon key.');
                setSyncStatus('saving');
                try {
                    const client = supabase.createClient(sbUrl, sbKey);
                    // Try to load existing data first
                    const { data: existing, error: loadErr } = await client
                        .from('release_planning_snapshots')
                        .select('data')
                        .eq('key', 'all_teams')
                        .single();

                    if (loadErr && loadErr.code !== 'PGRST116') throw loadErr;

                    if (existing && existing.data) {
                        // Cloud data exists — load it
                        try {
                            const loaded = JSON.parse(existing.data);
                            setTeams(loaded);
                        } catch (_) {}
                    } else {
                        // No cloud data yet — push current local data up
                        await client
                            .from('release_planning_snapshots')
                            .upsert(
                                { key: 'all_teams', data: JSON.stringify(teams), updated_at: new Date().toISOString() },
                                { onConflict: 'key' }
                            );
                    }

                    supabaseRef.current = client;
                    isFirstLoad.current = false;
                    setSbConnected(true);
                    setSyncStatus('saved');
                    setLastSaved(new Date());
                    localStorage.setItem('rp_sbUrl', sbUrl);
                    localStorage.setItem('rp_sbKey', sbKey);
                    setShowConfig(false);
                    alert('Connected! Data synced with Supabase. All future changes will auto-save.');
                } catch (err) {
                    setSyncStatus('error');
                    if (err.message && err.message.includes('release_planning_snapshots')) {
                        alert(
                            'Table not found. Run this SQL in Supabase → SQL Editor:\n\n' +
                            'CREATE TABLE IF NOT EXISTS release_planning_snapshots (\n' +
                            '  key TEXT PRIMARY KEY,\n' +
                            '  data TEXT,\n' +
                            '  updated_at TIMESTAMPTZ DEFAULT NOW()\n' +
                            ');\n\nThen click Connect again.'
                        );
                    } else {
                        alert('Connection failed: ' + err.message);
                    }
                }
            };

            const forceSaveToSupabase = async () => {
                if (!sbConnected || !supabaseRef.current) return;
                setSyncStatus('saving');
                try {
                    const { error } = await supabaseRef.current
                        .from('release_planning_snapshots')
                        .upsert(
                            { key: 'all_teams', data: JSON.stringify(teams), updated_at: new Date().toISOString() },
                            { onConflict: 'key' }
                        );
                    if (!error) setLastSaved(new Date());
                    setSyncStatus(error ? 'error' : 'saved');
                } catch (_) {
                    setSyncStatus('error');
                }
            };

            const loadFromSupabase = async () => {
                if (!sbConnected || !supabaseRef.current) return;
                setSyncStatus('saving');
                try {
                    const { data, error } = await supabaseRef.current
                        .from('release_planning_snapshots')
                        .select('data')
                        .eq('key', 'all_teams')
                        .single();
                    if (error) throw error;
                    const loaded = JSON.parse(data.data);
                    isFirstLoad.current = true;   // prevent re-save loop
                    setTeams(migrateTeams(loaded));
                    setTimeout(() => { isFirstLoad.current = false; }, 100);
                    setSyncStatus('saved');
                    setLastSaved(new Date());
                } catch (err) {
                    setSyncStatus('error');
                    alert('Load failed: ' + err.message);
                }
            };

            // ── MongoDB Atlas App Services ────────────────────────────────────
            // Expects two HTTPS Endpoints on Atlas App Services:
            //   GET  <mgUrl>?key=all_teams          → { data: '<json string>' }
            //   POST <mgUrl>  body: { key, data }   → 200 OK
            const connectMongoDB = async () => {
                if (!mgUrl || !mgKey) return alert('Please enter your MongoDB Endpoint URL and API Key.');
                setMgSyncStatus('saving');
                try {
                    const r = await fetch(`${mgUrl}?key=all_teams`, { headers: { 'api-key': mgKey } });
                    if (!r.ok && r.status !== 404) throw new Error(`HTTP ${r.status}`);
                    const d = r.ok ? await r.json() : null;
                    if (d && d.data) {
                        try { setTeams(migrateTeams(JSON.parse(d.data))); } catch(_) {}
                    } else {
                        // push local data up
                        await fetch(mgUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'api-key': mgKey },
                            body: JSON.stringify({ key: 'all_teams', data: JSON.stringify(teams) })
                        });
                    }
                    isFirstLoad.current = false;
                    setMgConnected(true);
                    setMgSyncStatus('saved');
                    setMgLastSaved(new Date());
                    localStorage.setItem('rp_mgUrl', mgUrl);
                    localStorage.setItem('rp_mgKey', mgKey);
                    setShowConfig(false);
                    alert('Connected to MongoDB Atlas! Data synced. All future changes will auto-save.');
                } catch(err) {
                    setMgSyncStatus('error');
                    alert('MongoDB connection failed: ' + err.message +
                        '\n\nMake sure you have two HTTPS Endpoints set up in Atlas App Services:\n' +
                        '  GET  <url>?key=all_teams  → returns { data: string }\n' +
                        '  POST <url>  body: { key, data }  → upserts document');
                }
            };

            const forceSaveToMongoDB = async () => {
                if (!mgConnected || !mgUrl || !mgKey) return;
                setMgSyncStatus('saving');
                try {
                    const r = await fetch(mgUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'api-key': mgKey },
                        body: JSON.stringify({ key: 'all_teams', data: JSON.stringify(teams) })
                    });
                    if (r.ok) { setMgLastSaved(new Date()); setMgSyncStatus('saved'); }
                    else setMgSyncStatus('error');
                } catch(_) { setMgSyncStatus('error'); }
            };

            const loadFromMongoDB = async () => {
                if (!mgConnected || !mgUrl || !mgKey) return;
                setMgSyncStatus('saving');
                try {
                    const r = await fetch(`${mgUrl}?key=all_teams`, { headers: { 'api-key': mgKey } });
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const d = await r.json();
                    const loaded = JSON.parse(d.data);
                    isFirstLoad.current = true;
                    setTeams(migrateTeams(loaded));
                    setTimeout(() => { isFirstLoad.current = false; }, 100);
                    setMgSyncStatus('saved');
                    setMgLastSaved(new Date());
                } catch(err) {
                    setMgSyncStatus('error');
                    alert('MongoDB load failed: ' + err.message);
                }
            };

            // ── Export ────────────────────────────────────────────────────────
            const exportJSON = () => {
                const blob = new Blob([JSON.stringify(teams, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'release-plan.json'; a.click();
                URL.revokeObjectURL(url);
            };

            const exportCSV = () => {
                const esc = v => {
                    const s = String(v ?? '');
                    return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
                };
                const rows = [
                    ['Team','Release','Feature ID','Title','Ranking','Work Type','Size','Dev Start','QA Start',
                     'Dev Days','QA Days','Dev Hours','QA Hours','Assigned Dev','Assigned QA','PRD','Clarity','Status'].join(',')
                ];
                for (const [key, t] of Object.entries(teams)) {
                    const hpp = t.workingHoursPerDay || 7;
                    for (const item of t.workItems) {
                        const dev = t.teamMembers.find(m => m.id === item.assignedDev)?.name || '';
                        const qa  = t.teamMembers.find(m => m.id === item.assignedQA)?.name  || '';
                        rows.push([
                            esc(t.teamName), esc(t.releaseName), esc(item.featureId),
                            esc(item.title), item.ranking, item.workType, item.size,
                            item.devStartDate || item.startDate || '',
                            item.qaStartDate  || item.startDate || '',
                            +(( item.devHours||0) / hpp).toFixed(1),
                            +(( item.qaHours ||0) / hpp).toFixed(1),
                            item.devHours, item.qaHours,
                            esc(dev), esc(qa),
                            item.prdComplete ? 'Yes' : 'No',
                            item.designComplete ? 'Yes' : 'No',
                            item.isPlanned ? 'Planned' : 'Backlog'
                        ].join(','));
                    }
                }
                const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href = url; a.download = 'release-plan.csv'; a.click();
                URL.revokeObjectURL(url);
            };

            // ── CSV Export (per-team / all-teams) ────────────────────────
            const buildCSV = (teamList, fileName) => {
                const esc = v => {
                    const s = String(v ?? '');
                    return /[,"\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
                };
                const rows = [
                    ['Team','Release','Feature ID','Title','Ranking','Work Type','Size','Dev Start','QA Start',
                     'Dev Days','QA Days','Dev Hours','QA Hours','Assigned Dev','Assigned QA','PRD','Clarity','Status'].join(',')
                ];
                for (const t of teamList) {
                    const hpp = t.workingHoursPerDay || 7;
                    for (const item of t.workItems) {
                        const dev = t.teamMembers.find(m => m.id === item.assignedDev)?.name || '';
                        const qa  = t.teamMembers.find(m => m.id === item.assignedQA)?.name  || '';
                        rows.push([
                            esc(t.teamName), esc(t.releaseName), esc(item.featureId),
                            esc(item.title), item.ranking, item.workType, item.size,
                            item.devStartDate || item.startDate || '',
                            item.qaStartDate  || item.startDate || '',
                            +(( item.devHours||0) / hpp).toFixed(1),
                            +(( item.qaHours ||0) / hpp).toFixed(1),
                            item.devHours, item.qaHours,
                            esc(dev), esc(qa),
                            item.prdComplete ? 'Yes' : 'No',
                            item.designComplete ? 'Yes' : 'No',
                            item.isPlanned ? 'Planned' : 'Backlog'
                        ].join(','));
                    }
                }
                const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href = url; a.download = fileName; a.click();
                URL.revokeObjectURL(url);
            };

            const exportAllCSV = () => buildCSV(Object.values(teams), 'all-teams-release-plan.csv');

            const exportTeamCSV = () => {
                const t = teams[activeTab];
                const safe = (t?.teamName || 'team').replace(/[^a-z0-9_-]/gi, '_');
                buildCSV([t], `${safe}-release-plan.csv`);
            };

            // ── PDF Export (pure jsPDF, data-driven tables) ───────────────
            // Shared builder — pass an array of team objects to render
            const buildPDF = (teamList, fileName) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });
                const pageW = doc.internal.pageSize.getWidth();  // 841.89
                const pageH = doc.internal.pageSize.getHeight(); // 595.28
                const M = 30; // margin
                let y = M;

                // ── helpers ────────────────────────────────────────────────
                const checkPage = (need = 16) => {
                    if (y + need > pageH - M) { doc.addPage(); y = M; }
                };

                const sectionTitle = (txt) => {
                    checkPage(20);
                    doc.setFontSize(10); doc.setFont(undefined, 'bold');
                    doc.setTextColor(30, 64, 175);
                    doc.text(txt, M, y); y += 4;
                    doc.setDrawColor(30, 64, 175);
                    doc.line(M, y, pageW - M, y); y += 8;
                    doc.setDrawColor(0); doc.setTextColor(30, 41, 59);
                    doc.setFont(undefined, 'normal');
                };

                // Draw a table given headers[], rows[][], and column widths[]
                // Returns nothing; advances y.
                const drawTable = (headers, rows, colWidths, rowH = 14) => {
                    const tableW = colWidths.reduce((a, b) => a + b, 0);
                    const startX = M;

                    // Header row
                    checkPage(rowH + 2);
                    doc.setFillColor(241, 245, 249);
                    doc.rect(startX, y - rowH + 3, tableW, rowH, 'F');
                    doc.setFontSize(8); doc.setFont(undefined, 'bold');
                    doc.setTextColor(71, 85, 105);
                    let x = startX;
                    headers.forEach((h, i) => {
                        doc.text(String(h), x + 3, y);
                        doc.rect(x, y - rowH + 3, colWidths[i], rowH);
                        x += colWidths[i];
                    });
                    y += rowH;

                    // Data rows
                    doc.setFont(undefined, 'normal');
                    doc.setTextColor(30, 41, 59);
                    rows.forEach((row, ri) => {
                        checkPage(rowH + 2);
                        if (ri % 2 === 0) {
                            doc.setFillColor(248, 250, 252);
                            doc.rect(startX, y - rowH + 3, tableW, rowH, 'F');
                        }
                        x = startX;
                        row.forEach((cell, i) => {
                            const cellStr = String(cell ?? '');
                            const maxChars = Math.floor(colWidths[i] / 4.5);
                            const truncated = cellStr.length > maxChars ? cellStr.substring(0, maxChars - 1) + '…' : cellStr;
                            doc.text(truncated, x + 3, y);
                            doc.rect(x, y - rowH + 3, colWidths[i], rowH);
                            x += colWidths[i];
                        });
                        y += rowH;
                    });
                    y += 6;
                };

                // ── render one team ────────────────────────────────────────
                const renderTeam = (t) => {
                    const hp = t.workingHoursPerDay || 7;
                    const h2d = (h) => h > 0 ? +(h / hp).toFixed(1) : 0;
                    const wDays = calculateWorkingDays(t.startDate, t.endDate);
                    const hols  = parseInt(t.holidays) || 0;
                    const actDays = Math.max(0, wDays - hols);
                    const totalCap = t.teamMembers.reduce((s, m) => s + (parseFloat(m.capacity) || 0), 0);
                    const totalAllocH = t.workItems.reduce((s, i) => s + (parseInt(i.devHours)||0) + (parseInt(i.qaHours)||0), 0);
                    const totalAlloc = +(totalAllocH / hp).toFixed(1);
                    const util = totalCap > 0 ? Math.round((totalAlloc / totalCap) * 100) : 0;

                    // ── page title banner ──────────────────────────────────
                    doc.setFillColor(29, 78, 216);
                    doc.rect(0, y - 14, pageW, 22, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(13); doc.setFont(undefined, 'bold');
                    doc.text(`${t.teamName}  —  ${t.releaseName || ''}`, M, y);
                    doc.setFontSize(8); doc.setFont(undefined, 'normal');
                    doc.text(`Generated ${new Date().toLocaleDateString()}`, pageW - M, y, { align: 'right' });
                    doc.setTextColor(30, 41, 59);
                    y += 16;

                    // ── Summary stats row ──────────────────────────────────
                    doc.setFontSize(8);
                    const stats = [
                        `Period: ${t.startDate || '—'} → ${t.endDate || '—'}`,
                        `Actual Working Days: ${actDays}  (${wDays} − ${hols} holidays)`,
                        `Hours/Day: ${hp}`,
                        `Team Capacity: ${totalCap}d`,
                        `Allocated: ${totalAlloc}d`,
                        `Utilization: ${util}%`,
                    ];
                    stats.forEach((s, i) => {
                        doc.text(s, M + (i % 3) * 260, y + Math.floor(i / 3) * 11);
                    });
                    y += 28;

                    // ── Section 1: Team Capacity ───────────────────────────
                    sectionTitle('1. Team Capacity');
                    if (t.teamMembers.length === 0) {
                        doc.setFontSize(8); doc.text('No team members.', M, y); y += 14;
                    } else {
                        const memberRows = t.teamMembers.map(m => {
                            const devH = t.workItems.filter(i => i.assignedDev === m.id).reduce((s, i) => s + (parseInt(i.devHours)||0), 0);
                            const qaH  = t.workItems.filter(i => i.assignedQA  === m.id).reduce((s, i) => s + (parseInt(i.qaHours) ||0), 0);
                            const cap  = parseFloat(m.capacity) || 0;
                            const totD = h2d(devH + qaH);
                            const uPct = cap > 0 ? Math.round((totD / cap) * 100) : 0;
                            return [m.name, `${cap}d`, `${h2d(devH)}d`, `${h2d(qaH)}d`, `${totD}d`, `${uPct}%`];
                        });
                        memberRows.push(['TOTAL', `${totalCap}d`,
                            `${h2d(t.workItems.reduce((s,i)=>s+(parseInt(i.devHours)||0),0))}d`,
                            `${h2d(t.workItems.reduce((s,i)=>s+(parseInt(i.qaHours) ||0),0))}d`,
                            `${totalAlloc}d`, `${util}%`]);
                        drawTable(['Name','Capacity','Dev Days','QA Days','Total','Utilization'],
                                  memberRows, [160, 60, 65, 65, 65, 70]);
                    }

                    // ── Section 2: Work Type Breakdown ─────────────────────
                    sectionTitle('2. Work Type Breakdown');
                    const wtDefs = [
                        { wt: 'feature',  label: 'Feature Development', target: '≥70%' },
                        { wt: 'techdebt', label: 'Tech Debt',           target: '≥20%' },
                        { wt: 'adhoc',    label: 'Adhoc / BAU',         target: '≥10%' },
                        { wt: 'bug',      label: 'Bug Fixes',           target: '—'    },
                    ];
                    const wtRows = wtDefs.map(({ wt, label, target }) => {
                        const h = t.workItems.filter(i => i.workType === wt).reduce((s, i) => s + (parseInt(i.devHours)||0) + (parseInt(i.qaHours)||0), 0);
                        const d = h2d(h);
                        const pct = totalCap > 0 ? Math.round((d / totalCap) * 100) : 0;
                        return [label, `${d}d`, `${pct}%`, target];
                    });
                    drawTable(['Work Type','Days Allocated','% of Capacity','Target'], wtRows, [200, 90, 90, 100]);

                    // ── Section 3: Work Items ──────────────────────────────
                    sectionTitle('3. Work Items');
                    if (t.workItems.length === 0) {
                        doc.setFontSize(8); doc.text('No work items.', M, y); y += 14;
                    } else {
                        const sorted = [...t.workItems].sort((a, b) => a.ranking - b.ranking);
                        const itemRows = sorted.map(item => {
                            const devName = t.teamMembers.find(m => m.id === item.assignedDev)?.name || '—';
                            const qaName  = t.teamMembers.find(m => m.id === item.assignedQA )?.name || '—';
                            const dStart  = item.devStartDate || item.startDate || '';
                            const qStart  = item.qaStartDate  || item.startDate || '';
                            const devEta  = dStart && item.devHours > 0 ? addWorkingHours(dStart, item.devHours, hp) : '';
                            const qaEta   = qStart && item.qaHours  > 0 ? addWorkingHours(qStart, item.qaHours,  hp) : '';
                            const eta     = devEta && qaEta ? (devEta > qaEta ? devEta : qaEta) : devEta || qaEta;
                            return [
                                item.featureId || '—',
                                item.title || '—',
                                item.ranking,
                                item.workType,
                                item.size,
                                `${h2d(item.devHours)}d`,
                                `${h2d(item.qaHours)}d`,
                                devName,
                                qaName,
                                eta || '—',
                                item.prdComplete ? '✓' : '',
                                item.designComplete ? '✓' : '',
                                item.isPlanned ? 'Planned' : 'Backlog',
                            ];
                        });
                        drawTable(
                            ['ID','Title','Rank','Type','Size','Dev d','QA d','Dev','QA','ETA','PRD','Clarity','Status'],
                            itemRows,
                            [38, 130, 28, 42, 28, 32, 32, 60, 60, 52, 26, 36, 42]
                        );
                    }
                };

                // ── render each team on its own page ──────────────────────
                let first = true;
                for (const t of teamList) {
                    if (!first) { doc.addPage(); y = M; }
                    first = false;
                    y = M + 10;
                    renderTeam(t);
                }

                doc.save(fileName);
            };

            // Top-bar: all teams, one page each
            const exportAllPDF = () => {
                buildPDF(Object.values(teams), 'all-teams-release-plan.pdf');
            };

            // Work-items button: current tab only
            const exportTeamPDF = () => {
                const t = teams[activeTab];
                const safe = (t?.teamName || 'team').replace(/[^a-z0-9_-]/gi, '_');
                buildPDF([t], `${safe}-release-plan.pdf`);
            };

            // ── Reset ─────────────────────────────────────────────────────────
            const clearAll = () => {
                if (confirm('Reset ALL teams? This cannot be undone.')) {
                    setTeams(DEFAULT_TEAMS);
                    setActiveTab('Team1');
                }
            };

            const clearLocalStorage = () => {
                if (confirm('Clear all browser local storage for this app?\n\nThis removes locally cached data and saved Supabase credentials from this browser. Cloud data in Supabase is NOT affected.')) {
                    ['rp_teams','rp_activeTab','rp_sbUrl','rp_sbKey'].forEach(k => localStorage.removeItem(k));
                    alert('Local storage cleared. Reload the page to start fresh.');
                }
            };

            // ─────────────────────────────────────────────────────────────────
            // RENDER
            // ─────────────────────────────────────────────────────────────────
            return (
                <div className="min-h-screen" style={{ background: '#f1f5f9' }}>
                    {/* Top Bar */}
                    <div className="bg-gradient-to-r from-blue-700 to-indigo-700 text-white px-6 py-3 flex items-center justify-between shadow-lg">
                        <div className="flex items-center gap-3">
                            {/* HighQ + Thomson Reuters logo */}
                            <div className="flex items-center gap-2 bg-white rounded-lg px-3 py-1.5 shadow">
                                {/* TR dot-circle */}
                                <svg width="32" height="32" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="50" cy="20" r="7" fill="#f97316"/>
                                    <circle cx="68" cy="26" r="6.5" fill="#f97316"/>
                                    <circle cx="80" cy="40" r="6" fill="#f97316"/>
                                    <circle cx="83" cy="57" r="5.5" fill="#f97316"/>
                                    <circle cx="75" cy="72" r="5" fill="#f97316"/>
                                    <circle cx="60" cy="82" r="5" fill="#f97316"/>
                                    <circle cx="43" cy="83" r="5" fill="#f97316"/>
                                    <circle cx="28" cy="74" r="5" fill="#f97316"/>
                                    <circle cx="18" cy="60" r="5.5" fill="#f97316"/>
                                    <circle cx="17" cy="43" r="6" fill="#f97316"/>
                                    <circle cx="25" cy="28" r="6.5" fill="#f97316"/>
                                    <circle cx="50" cy="50" r="14" fill="white"/>
                                </svg>
                                {/* HighQ text */}
                                <span style={{fontFamily:'Arial Black,Arial,sans-serif', fontWeight:900, fontSize:'20px', letterSpacing:'-0.5px', color:'#111'}}>
                                    High<span style={{color:'#38bdf8'}}>Q</span>
                                </span>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">Release Planning</h1>
                                <p className="text-blue-200 text-xs">Multi-team work planning tool</p>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center flex-wrap">
                            <button onClick={() => setShowConfig(!showConfig)}
                                className="bg-white/20 hover:bg-white/30 text-white text-xs px-3 py-1.5 rounded-md">
                                ⚙️ Cloud Sync
                            </button>
                            {sbConnected && (
                                <span className={`text-xs px-3 py-1.5 rounded-md font-semibold ${
                                    syncStatus === 'saving' ? 'bg-yellow-400 text-yellow-900' :
                                    syncStatus === 'saved'  ? 'bg-emerald-500 text-white' :
                                    syncStatus === 'error'  ? 'bg-red-500 text-white' :
                                    'bg-white/10 text-white'
                                }`} title={lastSaved ? `Last saved to Supabase: ${lastSaved.toLocaleTimeString()}` : 'Supabase connected'}>
                                    {syncStatus === 'saving' ? '⏳ Saving…' :
                                     syncStatus === 'saved'  ? `🟢 Supabase${lastSaved ? ' · ' + lastSaved.toLocaleTimeString() : ''}` :
                                     syncStatus === 'error'  ? '❌ Supabase error' : '🟢 Supabase'}
                                </span>
                            )}
                            {sbConnected && <>
                                <button onClick={forceSaveToSupabase} className="bg-emerald-500 hover:bg-emerald-600 text-xs px-3 py-1.5 rounded-md" title="Force save to Supabase">☁️ Save</button>
                                <button onClick={loadFromSupabase} className="bg-sky-500 hover:bg-sky-600 text-xs px-3 py-1.5 rounded-md" title="Reload from Supabase">⬇️ Load</button>
                            </>}
                            {mgConnected && (
                                <span className={`text-xs px-3 py-1.5 rounded-md font-semibold ${
                                    mgSyncStatus === 'saving' ? 'bg-yellow-400 text-yellow-900' :
                                    mgSyncStatus === 'saved'  ? 'bg-green-600 text-white' :
                                    mgSyncStatus === 'error'  ? 'bg-red-500 text-white' :
                                    'bg-white/10 text-white'
                                }`} title={mgLastSaved ? `Last saved to MongoDB: ${mgLastSaved.toLocaleTimeString()}` : 'MongoDB connected'}>
                                    {mgSyncStatus === 'saving' ? '⏳ Saving…' :
                                     mgSyncStatus === 'saved'  ? `🍃 MongoDB${mgLastSaved ? ' · ' + mgLastSaved.toLocaleTimeString() : ''}` :
                                     mgSyncStatus === 'error'  ? '❌ MongoDB error' : '🍃 MongoDB'}
                                </span>
                            )}
                            {mgConnected && <>
                                <button onClick={forceSaveToMongoDB} className="bg-green-600 hover:bg-green-700 text-xs px-3 py-1.5 rounded-md" title="Force save to MongoDB">🍃 Save</button>
                                <button onClick={loadFromMongoDB} className="bg-teal-600 hover:bg-teal-700 text-xs px-3 py-1.5 rounded-md" title="Reload from MongoDB">⬇️ Load</button>
                            </>}
                            <button onClick={exportCSV}  className="bg-white/20 hover:bg-white/30 text-xs px-3 py-1.5 rounded-md">📊 CSV</button>
                            <button onClick={exportAllCSV} className="bg-white/20 hover:bg-white/30 text-xs px-3 py-1.5 rounded-md" title="Download all teams as CSV">📊 CSV (all teams)</button>
                            <button onClick={exportAllPDF} className="bg-white/20 hover:bg-white/30 text-xs px-3 py-1.5 rounded-md" title="Download all teams as PDF (one page per team)">📄 PDF (all teams)</button>
                            <button onClick={exportJSON} className="bg-white/20 hover:bg-white/30 text-xs px-3 py-1.5 rounded-md">💾 JSON</button>
                            <button onClick={clearAll}   className="bg-red-500/70 hover:bg-red-600 text-xs px-3 py-1.5 rounded-md" title="Reset all team data to defaults">🗑 Reset</button>
                            <button onClick={clearLocalStorage} className="bg-slate-500/70 hover:bg-slate-600 text-xs px-3 py-1.5 rounded-md" title="Clear browser local storage (cloud data is safe)">🧹 Clear Cache</button>
                        </div>
                    </div>

                    {/* Cloud Sync Config Panel */}
                    {showConfig && (
                        <div className="bg-slate-800 text-white px-6 py-4 text-sm">
                            {/* Tabs */}
                            <div className="flex gap-1 mb-4 border-b border-slate-600 pb-2">
                                <button
                                    onClick={() => setConfigTab('supabase')}
                                    className={`px-4 py-1.5 rounded-t text-xs font-semibold ${
                                        configTab === 'supabase' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'
                                    }`}>
                                    🐘 Supabase / PostgreSQL
                                </button>
                                <button
                                    onClick={() => setConfigTab('mongodb')}
                                    className={`px-4 py-1.5 rounded-t text-xs font-semibold ${
                                        configTab === 'mongodb' ? 'bg-green-700 text-white' : 'text-slate-400 hover:text-white'
                                    }`}>
                                    🍃 MongoDB Atlas
                                </button>
                            </div>

                            {configTab === 'supabase' && (
                                <div className="flex flex-wrap gap-3 items-end">
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Supabase Project URL</label>
                                        <input value={sbUrl} onChange={e => setSbUrl(e.target.value)}
                                            placeholder="https://xxxx.supabase.co"
                                            className="bg-slate-700 border border-slate-600 rounded px-2 py-1 w-72 text-white text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Anon Public Key</label>
                                        <input value={sbKey} onChange={e => setSbKey(e.target.value)}
                                            type="password" placeholder="eyJ..."
                                            className="bg-slate-700 border border-slate-600 rounded px-2 py-1 w-72 text-white text-xs" />
                                    </div>
                                    <button onClick={connectSupabase}
                                        className={`px-4 py-1.5 rounded text-xs font-semibold ${sbConnected ? 'bg-emerald-600' : 'bg-blue-600 hover:bg-blue-500'}`}>
                                        {sbConnected ? '✅ Connected' : 'Connect'}
                                    </button>
                                    <div className="w-full">
                                        <p className="text-slate-400 text-xs">
                                            <strong className="text-slate-300">New to Supabase?</strong> Go to{' '}
                                            <a href="https://supabase.com" target="_blank" className="text-blue-400 underline">supabase.com</a>{' '}
                                            → New Project → SQL Editor → run:
                                        </p>
                                        <code className="block mt-1 bg-slate-900 text-green-400 text-xs px-3 py-2 rounded">
                                            CREATE TABLE IF NOT EXISTS release_planning_snapshots (key TEXT PRIMARY KEY, data TEXT, updated_at TIMESTAMPTZ DEFAULT NOW());
                                        </code>
                                        <p className="text-slate-400 text-xs mt-1">Then copy <strong className="text-slate-300">Project URL</strong> + <strong className="text-slate-300">anon key</strong> from Settings → API.</p>
                                        <p className="text-slate-400 text-xs mt-1">✅ Works with <strong className="text-slate-300">existing PostgreSQL</strong> too — connect your Postgres to Supabase via Settings → Database → Connection Pooling.</p>
                                    </div>
                                </div>
                            )}

                            {configTab === 'mongodb' && (
                                <div className="flex flex-wrap gap-3 items-end">
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">Atlas App Services Endpoint URL</label>
                                        <input value={mgUrl} onChange={e => setMgUrl(e.target.value)}
                                            placeholder="https://ap-southeast-1.aws.data.mongodb-api.com/app/.../endpoint/rp"
                                            className="bg-slate-700 border border-slate-600 rounded px-2 py-1 w-96 text-white text-xs" />
                                    </div>
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1">API Key</label>
                                        <input value={mgKey} onChange={e => setMgKey(e.target.value)}
                                            type="password" placeholder="API key from Atlas App Services"
                                            className="bg-slate-700 border border-slate-600 rounded px-2 py-1 w-72 text-white text-xs" />
                                    </div>
                                    <button onClick={connectMongoDB}
                                        className={`px-4 py-1.5 rounded text-xs font-semibold ${mgConnected ? 'bg-emerald-600' : 'bg-green-700 hover:bg-green-600'}`}>
                                        {mgConnected ? '✅ Connected' : 'Connect'}
                                    </button>
                                    <div className="w-full">
                                        <p className="text-slate-400 text-xs">
                                            <strong className="text-slate-300">Setup (5 steps):</strong>
                                        </p>
                                        <ol className="text-slate-400 text-xs list-decimal ml-4 mt-1 space-y-0.5">
                                            <li>Go to <a href="https://cloud.mongodb.com" target="_blank" className="text-green-400 underline">cloud.mongodb.com</a> → your cluster → <strong className="text-slate-300">App Services</strong> → Create App</li>
                                            <li>In the app: <strong className="text-slate-300">HTTPS Endpoints</strong> → Add Endpoint, Route <code className="text-green-400">/rp</code>, Methods: GET + POST</li>
                                            <li>Link a Function that reads/writes a <code className="text-green-400">release_planning</code> collection (key + data fields)</li>
                                            <li>In <strong className="text-slate-300">Authentication</strong> → API Keys → Create key → copy it above</li>
                                            <li>Deploy the app → copy the Endpoint URL above</li>
                                        </ol>
                                        <p className="text-slate-400 text-xs mt-2">The app sends <code className="text-green-400">GET ?key=all_teams</code> to load and <code className="text-green-400">POST {'{'} key, data {'}'}</code> to save.</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* Tabs */}
                    <div className="bg-white border-b border-slate-200 px-6 pt-3 flex gap-1 flex-wrap items-center">
                        {Object.entries(teams).map(([key, t]) => (
                            <div key={key} className="flex items-center">
                                <button
                                    onClick={() => setActiveTab(key)}
                                    className={`px-4 py-2 rounded-t-lg text-sm font-medium transition-colors ${activeTab === key ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                                    {t.teamName}
                                </button>
                                {Object.keys(teams).length > 1 && (
                                    <button onClick={() => removeTab(key)}
                                        className="text-slate-400 hover:text-red-500 ml-0.5 mb-0.5 text-xs px-1">✕</button>
                                )}
                            </div>
                        ))}
                        <button onClick={addTab}
                            className="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded text-sm font-medium ml-1">
                            + Add Team
                        </button>
                    </div>

                    <div className="p-4 max-w-screen-2xl mx-auto space-y-4">
                        {/* ── Release Header ──────────────────────────────────── */}
                        <div id={`pdf-stats-${activeTab}`} className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 items-end">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Team Name</label>
                                    <input value={team.teamName}
                                        onChange={e => setTeamField('teamName', e.target.value)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Release Name</label>
                                    <input value={team.releaseName}
                                        onChange={e => setTeamField('releaseName', e.target.value)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Start Date</label>
                                    <input type="date" value={team.startDate}
                                        onChange={e => setTeamField('startDate', e.target.value)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">End Date</label>
                                    <input type="date" value={team.endDate}
                                        onChange={e => setTeamField('endDate', e.target.value)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1" title="Public holidays, company days off, etc. to subtract from working days">Holidays 🗓</label>
                                    <input type="number" min="0" value={team.holidays || 0}
                                        onChange={e => setTeamField('holidays', parseInt(e.target.value) || 0)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none"
                                        title="Number of holidays/days off to subtract from working days" />
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Hours / Day</label>
                                    <input type="number" min="1" max="24" value={team.workingHoursPerDay}
                                        onChange={e => setTeamField('workingHoursPerDay', parseInt(e.target.value) || 7)}
                                        className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                            </div>

                            {/* Quick stats bar */}
                            <div className="mt-4 grid grid-cols-2 md:grid-cols-4 gap-3 text-center">
                                {[
                                    { label: 'Actual Working Days', value: actualWorkingDays, color: 'text-blue-600',
                                      title: `${workingDays} working days − ${holidays} holiday(s) = ${actualWorkingDays} days` },
                                    { label: 'Team Capacity', value: `${totalCapacity}d`, color: 'text-indigo-600',
                                      title: 'Sum of all members\' capacity in days' },
                                    { label: 'Allocated', value: `${totalAllocated}d`, color: totalAllocated > totalCapacity ? 'text-red-600' : 'text-emerald-600',
                                      title: `Total allocated effort: ${totalAllocatedHours}h ÷ ${team.workingHoursPerDay}h/day` },
                                    { label: 'Utilization', value: `${overallUtil}%`, color: overallUtil > 100 ? 'text-red-600' : overallUtil > 80 ? 'text-orange-500' : 'text-emerald-600',
                                      title: 'Allocated days ÷ Team capacity days' },
                                ].map(s => (
                                    <div key={s.label} className="bg-slate-50 rounded-lg p-3" title={s.title || ''}>
                                        <div className={`text-2xl font-bold ${s.color}`}>{s.value}</div>
                                        <div className="text-xs text-slate-500 mt-0.5">{s.label}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* ── 3 column row: Team Capacity | Work Type | Size Mapping ── */}
                        <div id={`pdf-metrics-${activeTab}`} className="grid grid-cols-1 lg:grid-cols-3 gap-4">

                            {/* Team Capacity Matrix */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                                <div className="flex justify-between items-center mb-3">
                                    <h2 className="text-sm font-bold text-slate-700">👥 Team Capacity</h2>
                                    <button onClick={addMember}
                                        className="bg-blue-600 text-white text-xs px-3 py-1.5 rounded-lg hover:bg-blue-700">
                                        + Member
                                    </button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-xs">
                                        <thead>
                                            <tr className="text-slate-500 border-b">
                                                <th className="text-left py-1.5 font-semibold">Name</th>
                                                <th className="text-center py-1.5 font-semibold w-16">Cap (d)</th>
                                                <th className="text-center py-1.5 font-semibold w-14">Dev d</th>
                                                <th className="text-center py-1.5 font-semibold w-14">QA d</th>
                                                <th className="text-left py-1.5 font-semibold">Utilization</th>
                                                <th className="w-6"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {team.teamMembers.map(member => {
                                                const alloc = getMemberAlloc(member.id);
                                                const cap   = parseFloat(member.capacity) || 0;
                                                return (
                                                    <tr key={member.id} className="border-b border-slate-50 hover:bg-slate-50">
                                                        <td className="py-1.5">
                                                            <input value={member.name}
                                                                onChange={e => updateMember(member.id, 'name', e.target.value)}
                                                                className="inline-input text-xs font-medium" />
                                                        </td>
                                                        <td className="py-1.5 text-center">
                                                            <input type="number" min="0" step="0.5" value={member.capacity}
                                                                onChange={e => updateMember(member.id, 'capacity', parseFloat(e.target.value)||0)}
                                                                className="inline-input text-center w-14 text-xs"
                                                                title={`= ${Math.round((parseFloat(member.capacity)||0) * (team.workingHoursPerDay||7))}h`} />
                                                        </td>
                                                        <td className="py-1.5 text-center text-blue-600 font-medium">{alloc.devD}d</td>
                                                        <td className="py-1.5 text-center text-purple-600 font-medium">{alloc.qaD}d</td>
                                                        <td className="py-1.5 w-32">
                                                            <ProgressBar value={alloc.totalD} max={cap}
                                                                label={`${alloc.totalD}/${cap}d (${cap>0?Math.round(alloc.totalD/cap*100):0}%)`} />
                                                        </td>
                                                        <td className="py-1.5">
                                                            <button onClick={() => deleteMember(member.id)}
                                                                className="text-red-400 hover:text-red-600 text-xs px-1">✕</button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {team.teamMembers.length === 0 && (
                                                <tr><td colSpan={6} className="text-center text-slate-400 py-6 italic">No members yet. Click + Member.</td></tr>
                                            )}
                                            {team.teamMembers.length > 0 && (
                                                <tr className="bg-slate-50 font-semibold text-slate-600">
                                                    <td className="py-1.5">Total</td>
                                                    <td className="py-1.5 text-center">{totalCapacity}d</td>
                                                    <td className="py-1.5 text-center text-blue-600">
                                                        {+((team.workItems.reduce((s,i)=>s+(parseInt(i.devHours)||0),0))/(team.workingHoursPerDay||7)).toFixed(1)}d
                                                    </td>
                                                    <td className="py-1.5 text-center text-purple-600">
                                                        {+((team.workItems.reduce((s,i)=>s+(parseInt(i.qaHours)||0),0))/(team.workingHoursPerDay||7)).toFixed(1)}d
                                                    </td>
                                                    <td colSpan={2}>
                                                        <ProgressBar value={totalAllocated} max={totalCapacity}
                                                            label={`${totalAllocated}/${totalCapacity}d`} />
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Work Type Breakdown */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                                <h2 className="text-sm font-bold text-slate-700 mb-3">📊 Work Type Breakdown</h2>
                                <div className="space-y-3">
                                    {[
                                        { wt: 'feature',  label: 'Feature Development', color: 'bg-blue-500',   target: 70 },
                                        { wt: 'techdebt', label: 'Tech Debt',           color: 'bg-orange-400', target: 20 },
                                        { wt: 'adhoc',    label: 'Adhoc / BAU',         color: 'bg-purple-400', target: 10 },
                                        { wt: 'bug',      label: 'Bug Fixes',           color: 'bg-red-400',    target: 0  },
                                    ].map(({ wt, label, color, target }) => {
                                        const pct = wtPct(wt);
                                        const days = workTypeTotals[wt] || 0;
                                        return (
                                            <div key={wt}>
                                                <div className="flex justify-between text-xs mb-1">
                                                    <span className="font-medium text-slate-600">{label}</span>
                                                    <span className={`font-bold ${target && pct < target ? 'text-orange-500' : 'text-slate-700'}`}>
                                                        {pct}% <span className="text-slate-400 font-normal">({days}d)</span>
                                                    </span>
                                                </div>
                                                <div className="progress-bar">
                                                    <div className={`progress-fill ${color}`} style={{ width: `${Math.min(pct,100)}%` }} />
                                                </div>
                                                {target > 0 && (
                                                    <div className="text-xs text-slate-400 mt-0.5">Target: ≥{target}%</div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-4 pt-3 border-t border-slate-100">
                                    <div className="flex justify-between text-xs font-semibold text-slate-600">
                                        <span>Total Allocated / Team Capacity</span>
                                        <span>{totalAllocated}d / {totalCapacity}d</span>
                                    </div>
