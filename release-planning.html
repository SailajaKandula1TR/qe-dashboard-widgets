                                    <ProgressBar value={totalAllocated} max={totalCapacity}
                                        colorClass="bg-blue-500"
                                        label={`Team utilization: ${overallUtil}% of ${totalCapacity}d total capacity`} />
                                </div>
                            </div>

                            {/* Size Mapping Matrix */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                                <h2 className="text-sm font-bold text-slate-700 mb-3">📏 Size Mapping</h2>
                                <table className="w-full text-xs">
                                    <thead>
                                        <tr className="text-slate-500 border-b">
                                            <th className="text-left py-1.5 font-semibold">Size</th>
                                            <th className="text-center py-1.5 font-semibold">Sprints</th>
                                            <th className="text-center py-1.5 font-semibold">Dev Days</th>
                                            <th className="text-center py-1.5 font-semibold">QA Days</th>
                                            <th className="text-center py-1.5 font-semibold">Total d</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {team.sizeMappings.map((sm, idx) => (
                                            <tr key={sm.size} className="border-b border-slate-50 hover:bg-slate-50">
                                                <td className="py-2">
                                                    <span className={`inline-block px-2 py-0.5 rounded text-xs font-bold ${
                                                        sm.size==='XS' ?'bg-slate-100 text-slate-600':
                                                        sm.size==='S'  ?'bg-green-100 text-green-700':
                                                        sm.size==='M'  ?'bg-blue-100 text-blue-700':
                                                        sm.size==='L'  ?'bg-orange-100 text-orange-700':
                                                        sm.size==='XL' ?'bg-purple-100 text-purple-700':
                                                                        'bg-red-100 text-red-700'}`}>
                                                        {sm.size}
                                                    </span>
                                                </td>
                                                <td className="py-2 text-center font-medium text-slate-500">
                                                    <input type="number" min="0" step="1"
                                                        value={sm.sprints ?? ''}
                                                        onChange={e => {
                                                            const updated = [...team.sizeMappings];
                                                            updated[idx] = { ...sm, sprints: parseInt(e.target.value) || 0 };
                                                            setSizeMappings(updated);
                                                        }}
                                                        className="inline-input text-center w-10 text-xs border-b border-slate-200" />
                                                    <span className="text-slate-400 text-xs ml-0.5">sp</span>
                                                </td>
                                                <td className="py-2 text-center">
                                                    <input type="number" min="0" step="0.5"
                                                        value={hoursToDays(sm.devHours)}
                                                        onChange={e => {
                                                            const updated = [...team.sizeMappings];
                                                            updated[idx] = { ...sm, devHours: daysToHours(e.target.value) };
                                                            setSizeMappings(updated);
                                                        }}
                                                        className="inline-input text-center w-14 text-xs border-b border-slate-200"
                                                        title={`= ${sm.devHours}h`} />
                                                    <span className="text-slate-400 ml-0.5">d</span>
                                                </td>
                                                <td className="py-2 text-center">
                                                    <input type="number" min="0" step="0.5"
                                                        value={hoursToDays(sm.qaHours)}
                                                        onChange={e => {
                                                            const updated = [...team.sizeMappings];
                                                            updated[idx] = { ...sm, qaHours: daysToHours(e.target.value) };
                                                            setSizeMappings(updated);
                                                        }}
                                                        className="inline-input text-center w-14 text-xs border-b border-slate-200"
                                                        title={`= ${sm.qaHours}h`} />
                                                    <span className="text-slate-400 ml-0.5">d</span>
                                                </td>
                                                <td className="py-2 text-center font-semibold text-slate-600">
                                                    {+(((sm.devHours||0) + (sm.qaHours||0)) / (team.workingHoursPerDay||7)).toFixed(1)}d
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <p className="text-slate-400 text-xs mt-3">
                                    💡 1 sprint = 10 days · Dev/QA split ~70/30 · hours stored internally ({hoursPerDay}h/day). Picking a size auto-fills effort.
                                </p>
                            </div>
                        </div>

                        {/* ── All Work Items Table ───────────────────────────── */}
                        <div id={`pdf-workitems-${activeTab}`} className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                            <div className="flex justify-between items-center mb-3">
                                <h2 className="text-sm font-bold text-slate-700">📋 All Work Items <span className="text-slate-400 font-normal">(drag ⠿ to reorder · rank is a grouping label)</span></h2>
                                <div className="flex gap-2">
                                    <button onClick={exportTeamCSV}
                                        className="bg-teal-500 hover:bg-teal-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium"
                                        title="Download this team only as CSV">
                                        📊 CSV (this team)
                                    </button>
                                    <button onClick={exportTeamPDF}
                                        className="bg-indigo-500 hover:bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium"
                                        title="Download this team only as PDF">
                                        📄 PDF (this team)
                                    </button>
                                    <button onClick={() => addWorkItem(false)}
                                        className="bg-blue-600 text-white text-xs px-4 py-1.5 rounded-lg hover:bg-blue-700 font-medium">
                                        + Add Work Item
                                    </button>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-xs">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-500 border-b text-left">
                                            <th className="px-3 py-2 font-semibold">ID</th>
                                            <th className="px-3 py-2 font-semibold">Title</th>
                                            <th className="px-3 py-2 font-semibold">Rank</th>
                                            <th className="px-3 py-2 font-semibold">Type</th>
                                            <th className="px-3 py-2 font-semibold">Size</th>
                                            <th className="px-3 py-2 font-semibold">Dev Start</th>
                                            <th className="px-3 py-2 font-semibold">Dev Days</th>
                                            <th className="px-3 py-2 font-semibold">QA Start</th>
                                            <th className="px-3 py-2 font-semibold">QA Days</th>
                                            <th className="px-3 py-2 font-semibold">Dev</th>
                                            <th className="px-3 py-2 font-semibold">QA</th>
                                            <th className="px-3 py-2 font-semibold">ETA</th>
                                            <th className="px-3 py-2 font-semibold">PRD</th>
                                            <th className="px-3 py-2 font-semibold">Clarity</th>
                                            <th className="px-3 py-2 font-semibold">Status</th>
                                            <th className="px-3 py-2"></th>
                                            <th className="px-1 py-2 w-6" title="Drag to reorder"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {team.workItems.map(item => {
                                            // Support legacy items that only have startDate
                                            const dStart = item.devStartDate || item.startDate || '';
                                            const qStart = item.qaStartDate  || item.startDate || '';
                                            const devEta = dStart && item.devHours > 0
                                                ? addWorkingHours(dStart, item.devHours, hoursPerDay) : '';
                                            const qaEta  = qStart && item.qaHours  > 0
                                                ? addWorkingHours(qStart, item.qaHours,  hoursPerDay) : '';
                                            // ETA = whichever finishes later
                                            const eta = devEta && qaEta ? (devEta > qaEta ? devEta : qaEta)
                                                      : devEta || qaEta;
                                            const isOverdue = eta && team.endDate && eta > team.endDate;
                                            return (
                                                <tr key={item.id}
                                                    draggable
                                                    onDragStart={() => { dragRowId.current = item.id; }}
                                                    onDragEnter={() => { dragOverRowId.current = item.id; }}
                                                    onDragOver={e => e.preventDefault()}
                                                    onDragEnd={reorderWorkItems}
                                                    className="border-b border-slate-50 hover:bg-slate-50 cursor-default">
                                                    <td className="px-3 py-2">
                                                        <input value={item.featureId}
                                                            onChange={e => updateWorkItem(item.id, 'featureId', e.target.value)}
                                                            className="inline-input w-16 font-mono" />
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <input value={item.title}
                                                            onChange={e => updateWorkItem(item.id, 'title', e.target.value)}
                                                            className="inline-input w-48" />
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <input type="number" value={item.ranking}
                                                            onChange={e => updateWorkItem(item.id, 'ranking', parseInt(e.target.value)||0)}
                                                            className="inline-input w-10 text-center" />
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <select value={item.workType}
                                                            onChange={e => updateWorkItem(item.id, 'workType', e.target.value)}
                                                            className="border border-slate-200 rounded px-1 py-0.5 text-xs">
                                                            <option value="feature">Feature</option>
                                                            <option value="techdebt">Tech Debt</option>
                                                            <option value="adhoc">Adhoc</option>
                                                            <option value="bug">Bug</option>
                                                        </select>
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <select value={item.size}
                                                            onChange={e => applySizePreset(item.id, e.target.value)}
                                                            className="border border-slate-200 rounded px-1 py-0.5 text-xs">
                                                            {team.sizeMappings.map(sm => (
                                                                <option key={sm.size} value={sm.size}>{sm.size}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    {/* Dev Start */}
                                                    <td className="px-3 py-2">
                                                        <input type="date" value={dStart}
                                                            onChange={e => updateWorkItem(item.id, 'devStartDate', e.target.value)}
                                                            className="inline-input w-28 text-xs" />
                                                    </td>
                                                    {/* Dev Days (stored as hours internally) */}
                                                    <td className="px-3 py-2">
                                                        <div className="flex items-center gap-0.5">
                                                            <input type="number" min="0" step="0.5"
                                                                value={hoursToDays(item.devHours)}
                                                                onChange={e => updateWorkItem(item.id, 'devHours', daysToHours(e.target.value))}
                                                                className="inline-input w-12 text-center"
                                                                title={`= ${item.devHours}h`} />
                                                            <span className="text-slate-400 text-xs">d</span>
                                                        </div>
                                                    </td>
                                                    {/* QA Start */}
                                                    <td className="px-3 py-2">
                                                        <input type="date" value={qStart}
                                                            onChange={e => updateWorkItem(item.id, 'qaStartDate', e.target.value)}
                                                            className="inline-input w-28 text-xs" />
                                                    </td>
                                                    {/* QA Days */}
                                                    <td className="px-3 py-2">
                                                        <div className="flex items-center gap-0.5">
                                                            <input type="number" min="0" step="0.5"
                                                                value={hoursToDays(item.qaHours)}
                                                                onChange={e => updateWorkItem(item.id, 'qaHours', daysToHours(e.target.value))}
                                                                className="inline-input w-12 text-center"
                                                                title={`= ${item.qaHours}h`} />
                                                            <span className="text-slate-400 text-xs">d</span>
                                                        </div>
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <select value={item.assignedDev||''}
                                                            onChange={e => updateWorkItem(item.id, 'assignedDev', e.target.value)}
                                                            className="border border-slate-200 rounded px-1 py-0.5 text-xs max-w-28">
                                                            <option value="">—</option>
                                                            {team.teamMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                        </select>
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <select value={item.assignedQA||''}
                                                            onChange={e => updateWorkItem(item.id, 'assignedQA', e.target.value)}
                                                            className="border border-slate-200 rounded px-1 py-0.5 text-xs max-w-28">
                                                            <option value="">—</option>
                                                            {team.teamMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                                        </select>
                                                    </td>
                                                    <td className={`px-3 py-2 whitespace-nowrap font-medium ${
                                                        isOverdue ? 'text-red-600' : 'text-slate-600'
                                                    }`} title={devEta && qaEta ? `Dev done: ${devEta} · QA done: ${qaEta}` : ''}>
                                                        {eta || '—'} {isOverdue && '⚠️'}
                                                    </td>
                                                    <td className="px-3 py-2 text-center">
                                                        {item.workType === 'feature' && (
                                                            <input type="checkbox" checked={!!item.prdComplete}
                                                                onChange={e => updateWorkItem(item.id, 'prdComplete', e.target.checked)}
                                                                title="PRD Complete" className="cursor-pointer" />
                                                        )}
                                                    </td>
                                                    <td className="px-3 py-2 text-center">
                                                        {item.workType === 'feature' && (
                                                            <input type="checkbox" checked={!!item.designComplete}
                                                                onChange={e => updateWorkItem(item.id, 'designComplete', e.target.checked)}
                                                                title="Clarity Complete" className="cursor-pointer" />
                                                        )}
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <button
                                                            onClick={() => updateWorkItem(item.id, 'isPlanned', !item.isPlanned)}
                                                            title="Click to toggle status"
                                                            className={`px-2 py-0.5 rounded-full text-xs font-semibold cursor-pointer transition-colors ${item.isPlanned ? 'bg-blue-100 text-blue-700 hover:bg-blue-200' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                                            {item.isPlanned ? '✅ Planned' : '📥 Backlog'}
                                                        </button>
                                                    </td>
                                                    <td className="px-3 py-2">
                                                        <button onClick={() => deleteWorkItem(item.id)}
                                                            className="text-red-400 hover:text-red-600 text-xs">✕</button>
                                                    </td>
                                                    <td className="px-1 py-2 text-center text-slate-300 hover:text-slate-500 cursor-grab select-none" title="Drag to reorder">
                                                        ⠿
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {team.workItems.length === 0 && (
                                            <tr><td colSpan={17} className="text-center text-slate-400 py-8 italic">No work items yet. Click "+ Add Work Item" to get started.</td></tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    {/* ── Test Completion Tracker ───────────────────────── */}
                    {(() => {
                        const TEST_STATUSES = ['Not Started', 'In Progress', 'Complete', 'Not Applicable'];
                        const STATUS_STYLE = {
                            'Not Started':    'bg-slate-100 text-slate-500',
                            'In Progress':    'bg-yellow-100 text-yellow-700',
                            'Complete':       'bg-emerald-100 text-emerald-700',
                            'Not Applicable': 'bg-slate-50 text-slate-400 italic',
                        };
                        const TEST_COLS = [
                            { key: 'testPlan',    label: 'Test Plan' },
                            { key: 'testMapping', label: 'Test Mapping' },
                            { key: 'testLegacy',  label: 'Test Legacy' },
                            { key: 'testModern',  label: 'Test Modern' },
                            { key: 'testOutcome', label: 'Test Outcome' },
                            { key: 'bugs',        label: 'Bugs' },
                        ];

                        const getCompletion = (item) => {
                            const vals = TEST_COLS.map(c => item[c.key] || 'Not Started');
                            const done = vals.filter(v => v === 'Complete' || v === 'Not Applicable').length;
                            return Math.round((done / vals.length) * 100);
                        };

                        const todayStr = new Date().toISOString().split('T')[0];
                        const plannedItems = team.workItems.filter(i => i.isPlanned);

                        return (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-5">
                                <div className="flex justify-between items-center mb-3">
                                    <h2 className="text-sm font-bold text-slate-700">🧪 Test Completion Tracker
                                        <span className="text-slate-400 font-normal ml-2">(planned items only · set a target date per item, statuses highlight when overdue)</span>
                                    </h2>
                                </div>
                                {plannedItems.length === 0 ? (
                                    <p className="text-slate-400 text-xs italic py-6 text-center">No planned work items yet. Mark items as ✅ Planned in the table above.</p>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-500 border-b text-left">
                                                    <th className="px-3 py-2 font-semibold w-20">ID</th>
                                                    <th className="px-3 py-2 font-semibold">Title</th>
                                                    <th className="px-3 py-2 font-semibold w-32" title="Target date to complete all testing">Target Date</th>
                                                    {TEST_COLS.map(c => (
                                                        <th key={c.key} className="px-3 py-2 font-semibold text-center w-28">{c.label}</th>
                                                    ))}
                                                    <th className="px-3 py-2 font-semibold text-center w-28">Completion</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {plannedItems.map(item => {
                                                    const pct = getCompletion(item);
                                                    const isOverdue = item.testPlanDate && todayStr > item.testPlanDate && pct < 100;
                                                    return (
                                                        <tr key={item.id}
                                                            className={`border-b border-slate-50 hover:bg-slate-50 ${
                                                                isOverdue ? 'bg-red-50' : ''
                                                            }`}>
                                                            <td className="px-3 py-2 font-mono text-slate-500">{item.featureId}</td>
                                                            <td className="px-3 py-2 font-medium text-slate-700">
                                                                {item.title}
                                                                {isOverdue && <span className="ml-1 text-red-500" title="Past target date!">⚠️ Overdue</span>}
                                                            </td>
                                                            <td className="px-3 py-2">
                                                                <input type="date" value={item.testPlanDate || ''}
                                                                    onChange={e => updateWorkItem(item.id, 'testPlanDate', e.target.value)}
                                                                    className={`border rounded px-1.5 py-0.5 text-xs w-28 ${
                                                                        isOverdue
                                                                            ? 'border-red-400 bg-red-50 text-red-700'
                                                                            : 'border-slate-200'
                                                                    }`} />
                                                            </td>
                                                            {TEST_COLS.map(col => (
                                                                <td key={col.key} className="px-2 py-2 text-center">
                                                                    <select
                                                                        value={item[col.key] || 'Not Started'}
                                                                        onChange={e => updateWorkItem(item.id, col.key, e.target.value)}
                                                                        className={`rounded px-1.5 py-0.5 text-xs w-full border-0 font-medium ${
                                                                            STATUS_STYLE[item[col.key] || 'Not Started']
                                                                        }`}>
                                                                        {TEST_STATUSES.map(s => (
                                                                            <option key={s} value={s}>{s}</option>
                                                                        ))}
                                                                    </select>
                                                                </td>
                                                            ))}
                                                            <td className="px-3 py-2">
                                                                <div className="flex items-center gap-1.5">
                                                                    <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                                        <div
                                                                            className={`h-2 rounded-full transition-all ${
                                                                                pct === 100 ? 'bg-emerald-500' :
                                                                                isOverdue   ? 'bg-red-500' :
                                                                                pct > 0     ? 'bg-yellow-400' : 'bg-slate-200'
                                                                            }`}
                                                                            style={{ width: `${pct}%` }}
                                                                        />
                                                                    </div>
                                                                    <span className={`text-xs font-semibold w-8 text-right ${
                                                                        pct === 100 ? 'text-emerald-600' :
                                                                        isOverdue   ? 'text-red-600' : 'text-slate-500'
                                                                    }`}>{pct}%</span>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        );
                    })()}

                    <footer className="text-center text-slate-400 text-xs py-6">
                        Release Planning App · Data auto-saved to browser storage{sbConnected ? ' & Supabase cloud' : ' (connect Supabase for cloud sync)'} · {new Date().getFullYear()}
                    </footer>
                </div>
            );
        }

        // ─── Backlog Card Component ───────────────────────────────────────────
        function BacklogCard({ item, teamMembers, sizeMappings, onUpdate, onDelete, onMoveToPlanning, onApplySize, onDragStart, onDragEnd }) {
            const wtColors = {
                feature: 'bg-blue-100 text-blue-700',
                techdebt: 'bg-orange-100 text-orange-700',
                adhoc: 'bg-purple-100 text-purple-700',
                bug: 'bg-red-100 text-red-700',
            };
            return (
                <div
                    draggable
                    onDragStart={e => onDragStart(e, item)}
                    onDragEnd={onDragEnd}
                    className="work-item-card border border-slate-200 rounded-lg p-3 hover:shadow-md transition-shadow bg-white"
                >
                    <div className="flex gap-2 items-start">
                        <span className="text-slate-300 text-lg cursor-grab mt-0.5">⠿</span>
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-2">
                                <input value={item.featureId}
                                    onChange={e => onUpdate(item.id, 'featureId', e.target.value)}
                                    className="inline-input font-mono text-xs w-14 text-slate-400" />
                                <input value={item.title}
                                    onChange={e => onUpdate(item.id, 'title', e.target.value)}
                                    className="inline-input font-semibold text-sm flex-1" />
                                <button onClick={() => onMoveToPlanning(item.id)}
                                    title="Move to Planning"
                                    className="text-blue-600 hover:bg-blue-100 rounded px-1.5 py-0.5 text-sm font-bold shrink-0">→</button>
                                <button onClick={() => onDelete(item.id)}
                                    className="text-red-400 hover:text-red-600 text-xs px-1 shrink-0">✕</button>
                            </div>
                            <div className="flex flex-wrap gap-2 items-center">
                                <input type="number" value={item.ranking}
                                    onChange={e => onUpdate(item.id, 'ranking', parseInt(e.target.value)||0)}
                                    placeholder="Rank"
                                    className="inline-input border border-slate-200 rounded w-14 px-1 text-xs text-center" />
                                <select value={item.workType}
                                    onChange={e => onUpdate(item.id, 'workType', e.target.value)}
                                    className={`rounded px-2 py-0.5 text-xs font-semibold border-0 ${wtColors[item.workType]}`}>
                                    <option value="feature">Feature</option>
                                    <option value="techdebt">Tech Debt</option>
                                    <option value="adhoc">Adhoc</option>
                                    <option value="bug">Bug</option>
                                </select>
                                <select value={item.size}
                                    onChange={e => onApplySize(item.id, e.target.value)}
                                    className="border border-slate-200 rounded px-2 py-0.5 text-xs">
                                    {sizeMappings.map(sm => <option key={sm.size} value={sm.size}>{sm.size}</option>)}
                                </select>
                                {item.workType === 'feature' && (
                                    <label className="flex items-center gap-1 text-xs text-slate-500 cursor-pointer">
                                        <input type="checkbox" checked={!!item.prdComplete}
                                            onChange={e => onUpdate(item.id, 'prdComplete', e.target.checked)} />
                                        PRD
                                    </label>
                                )}
                                {item.workType === 'feature' && (
                                    <label className="flex items-center gap-1 text-xs text-slate-500 cursor-pointer">
                                        <input type="checkbox" checked={!!item.designComplete}
                                            onChange={e => onUpdate(item.id, 'designComplete', e.target.checked)} />
                                        Clarity
                                    </label>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Planning Card Component ──────────────────────────────────────────
        function PlanningCard({ item, teamMembers, sizeMappings, endDate, workingHoursPerDay, onUpdate, onDelete, onMoveToBacklog, onApplySize, onDragStart, onDragEnd }) {
            const etaHours = Math.max(parseInt(item.devHours)||0, parseInt(item.qaHours)||0);
            const eta    = item.startDate && etaHours > 0 ? addWorkingHours(item.startDate, etaHours, workingHoursPerDay) : '';
            const isOverdue = eta && endDate && eta > endDate;

            const wtBg = {
                feature: 'border-l-blue-500',
                techdebt: 'border-l-orange-400',
                adhoc: 'border-l-purple-400',
                bug: 'border-l-red-400',
            };

            return (
                <div
                    draggable
                    onDragStart={e => onDragStart(e, item)}
                    onDragEnd={onDragEnd}
                    className={`work-item-card border border-slate-200 border-l-4 ${wtBg[item.workType]||'border-l-slate-300'} rounded-lg p-3 bg-blue-50/40 hover:shadow-md transition-shadow`}
                >
                    <div className="flex gap-2 items-start">
                        <span className="text-slate-300 text-lg cursor-grab mt-0.5">⠿</span>
                        <div className="flex-1 min-w-0">
                            {/* Row 1: ID + title + actions */}
                            <div className="flex items-center gap-2 mb-2">
                                <span className="font-mono text-xs text-slate-400">{item.featureId}</span>
                                <input value={item.title}
                                    onChange={e => onUpdate(item.id, 'title', e.target.value)}
                                    className="inline-input font-semibold text-sm flex-1" />
                                {isOverdue && <span title="Completion exceeds release end date" className="text-red-500 text-xs">⚠️</span>}
                                <button onClick={() => onMoveToBacklog(item.id)}
                                    title="Move to Backlog"
                                    className="text-slate-500 hover:bg-slate-200 rounded px-1.5 py-0.5 text-sm font-bold shrink-0">←</button>
                                <button onClick={() => onDelete(item.id)}
                                    className="text-red-400 hover:text-red-600 text-xs px-1 shrink-0">✕</button>
                            </div>
                            {/* Row 2: Size + hours */}
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div className="flex items-center gap-1">
                                    <label className="text-xs text-slate-500 shrink-0">Size</label>
                                    <select value={item.size}
                                        onChange={e => onApplySize(item.id, e.target.value)}
                                        className="border border-slate-200 rounded px-1 py-0.5 text-xs">
                                        {sizeMappings.map(sm => <option key={sm.size} value={sm.size}>{sm.size}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-center gap-1">
                                    <label className="text-xs text-slate-500 shrink-0">Start</label>
                                    <input type="date" value={item.startDate||''}
                                        onChange={e => onUpdate(item.id, 'startDate', e.target.value)}
                                        className="inline-input border border-slate-200 rounded px-1 py-0.5 text-xs w-28" />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div className="flex items-center gap-1">
                                    <label className="text-xs text-slate-500 shrink-0 w-10">Dev h</label>
                                    <input type="number" min="0" value={item.devHours}
                                        onChange={e => onUpdate(item.id, 'devHours', parseInt(e.target.value)||0)}
                                        className="border border-slate-200 rounded px-1 py-0.5 text-xs w-14 text-center" />
                                </div>
                                <div className="flex items-center gap-1">
                                    <label className="text-xs text-slate-500 shrink-0 w-10">QA h</label>
                                    <input type="number" min="0" value={item.qaHours}
                                        onChange={e => onUpdate(item.id, 'qaHours', parseInt(e.target.value)||0)}
                                        className="border border-slate-200 rounded px-1 py-0.5 text-xs w-14 text-center" />
                                </div>
                            </div>
                            {/* Row 3: Assign */}
                            <div className="grid grid-cols-2 gap-2 mb-2">
                                <div>
                                    <label className="text-xs text-slate-500 block mb-0.5">Dev</label>
                                    <select value={item.assignedDev||''}
                                        onChange={e => onUpdate(item.id, 'assignedDev', e.target.value)}
                                        className="border border-slate-200 rounded px-1 py-0.5 text-xs w-full">
                                        <option value="">— Unassigned</option>
                                        {teamMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs text-slate-500 block mb-0.5">QA</label>
                                    <select value={item.assignedQA||''}
                                        onChange={e => onUpdate(item.id, 'assignedQA', e.target.value)}
                                        className="border border-slate-200 rounded px-1 py-0.5 text-xs w-full">
                                        <option value="">— Unassigned</option>
                                        {teamMembers.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            {/* Row 4: PRD/Clarity + ETA */}
                            <div className="flex items-center justify-between">
                                <div className="flex gap-3">
                                    {item.workType === 'feature' && (
                                        <label className="flex items-center gap-1 text-xs text-slate-500 cursor-pointer">
                                            <input type="checkbox" checked={!!item.prdComplete}
                                                onChange={e => onUpdate(item.id, 'prdComplete', e.target.checked)} />
                                            PRD
                                        </label>
                                    )}
                                    {item.workType === 'feature' && (
                                        <label className="flex items-center gap-1 text-xs text-slate-500 cursor-pointer">
                                            <input type="checkbox" checked={!!item.designComplete}
                                                onChange={e => onUpdate(item.id, 'designComplete', e.target.checked)} />
                                            Clarity
                                        </label>
                                    )}
                                </div>
                                {eta && (
                                    <span className={`text-xs ${isOverdue ? 'overdue' : 'text-slate-500'}`}>
                                        ETA: {eta} {isOverdue && '⚠️'}
                                    </span>
                                )}
                                <span className="text-xs text-slate-400">{totalH}h total</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Mount ────────────────────────────────────────────────────────────
        ReactDOM.createRoot(document.getElementById('root')).render(<ReleasePlanningApp />);
    </script>
</body>

</html>
